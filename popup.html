<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Lyrics</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }

    .header-icon { font-size: 18px; color: #ff4444; }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-ver { font-size: 10px; color: #555; margin-left: auto; }

    .section {
      padding: 12px 16px;
    }

    .label {
      color: #777;
      font-size: 11px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .info-row:last-child { border-bottom: none; }

    .info-key { color: #888; }
    .info-val { color: #ccc; font-weight: 500; }

    .status-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    .status-chip.ok { background: #1a3a1a; color: #4caf50; border: 1px solid #2d6e2d; }
    .status-chip.ng { background: #3a1a1a; color: #f44; border: 1px solid #6e2d2d; }

    .footer {
      padding: 10px 16px;
      text-align: center;
      color: #444;
      font-size: 11px;
      border-top: 1px solid #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">♪</span>
    <span class="header-title">YT Lyrics</span>
    <span class="header-ver">v1.0</span>
  </div>

  <div class="section">
    <div class="label">状態</div>
    <div class="info-row">
      <span class="info-key">歌詞ソース</span>
      <span class="info-val">lrclib.net</span>
    </div>
    <div class="info-row">
      <span class="info-key">現在のページ</span>
      <span class="info-val" id="page-status"><span class="status-chip ng">YouTube外</span></span>
    </div>
    <div class="info-row">
      <span class="info-key">歌詞パネル</span>
      <span class="info-val" id="panel-status"><span class="status-chip ng">非表示</span></span>
    </div>
  </div>

  <div class="footer">
    歌詞提供: lrclib.net (CC BY 4.0)
  </div>

  <script src="popup.js"></script>
</body>
</html>
